name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest + ruff (python 3.11)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Run pytest
        run: |
          python -m pytest -v
