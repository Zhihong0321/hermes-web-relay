<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Login - Hermes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-4 antialiased selection:bg-indigo-500/30">

  <div class="w-full max-w-md bg-zinc-900/50 border border-zinc-800/80 backdrop-blur-xl rounded-2xl p-8 shadow-2xl relative overflow-hidden">
    <!-- Glow effect behind the card -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="flex flex-col items-center mb-8">
      <div class="flex items-center gap-2 mb-2">
        <span class="inline-block w-3 h-3 rounded-full bg-indigo-500 shadow-[0_0_12px_rgba(99,102,241,0.8)]"></span>
        <h1 class="text-2xl font-bold tracking-tight text-zinc-50 font-sans">Hermes</h1>
      </div>
      <p class="text-sm text-zinc-400">Sign in to access your local agent</p>
    </div>

    {% if error %}
    <div class="mb-6 px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form action="/auth/login" method="post" class="space-y-5">
      <input type="hidden" name="next" value="{{ next }}">

      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username"
               class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/30 transition-all font-mono">
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-zinc-400 mb-2">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password"
               class="w-full bg-zinc-950/80 border border-zinc-800 rounded-xl px-4 py-3 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/30 transition-all font-mono">
      </div>

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium text-sm rounded-xl py-3 shadow-[0_4px_20px_rgba(99,102,241,0.2)] hover:shadow-[0_4px_25px_rgba(99,102,241,0.4)] transition-all flex items-center justify-center gap-2">
        <span>Sign In</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
  </div>

</body>
</html>
